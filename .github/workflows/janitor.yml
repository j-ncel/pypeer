name: Database Janitor

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: # Allows to click a button to run it manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install httpx

      - name: Run Janitor
        env:
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
          FIREBASE_DB_SECRET: ${{ secrets.FIREBASE_DB_SECRET }}
        run: python scripts/janitor.py
